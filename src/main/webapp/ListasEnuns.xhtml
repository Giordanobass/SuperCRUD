<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://xmlns.jcp.org/jsf/html"
	xmlns:f="http://xmlns.jcp.org/jsf/core"
	xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
	xmlns:p="http://primefaces.org/ui">
<h:head></h:head>
<h:body>
	<h:form>

		<h:panelGrid columns="2" style="margin-bottom:10px" cellpadding="5">

			<h:panelGroup>
				<div>
					<fieldset>
						<p:outputLabel value="Consoles: " />
						<p:selectOneMenu
							value="#{videoGamesController.carregarComboGames()}">
							<f:selectItem itemLabel="Select One" />
							<f:selectItems value="#{videoGamesController.carregarComboGames}"
								var="games" itemValue="" itemLabel="#{games.label}" />
						</p:selectOneMenu>
						<p:outputLabel value="Quantidade" />
						<h:inputText value="" />
					</fieldset>
				</div>

				<div>
					<br />
					<fieldset>
					<p:outputLabel value="Relação de jogos" />
					<p:selectManyCheckbox
						value="#{videoGamesController.carregarComboJogos()}">
						<f:selectItems
							value="#{videoGamesController.carregarComboJogos()}" var="games"
							itemValue="" itemLabel="#{games.label}" />
					</p:selectManyCheckbox>
					<p:outputLabel value="Quantidade" />
					<h:inputText value="" />
					</fieldset>
				</div>

				<div>
					<br />
					<fieldset>
					
					<p:outputLabel value="Aluguel de jogos" />
					<h:selectOneRadio
						value="#{videoGamesController.carregarComboAluguel()}">
						<f:selectItems
							value="#{videoGamesController.carregarComboAluguel()}"
							var="aluguel" itemLabel="#{aluguel.label}" />
					</h:selectOneRadio>
				
					</fieldset>
				</div>
				<br />


				<p:commandButton value="Alugar" />
			</h:panelGroup>
		</h:panelGrid>
	</h:form>
</h:body>
</html>
